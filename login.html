<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | SMUCT Angan</title>
    <link rel="icon" type="image/png" href="images/smuct-logo.png">
<meta name="description" content="SMUCT Angan — campus event management for Shanto-Mariam University of Creative Technology.">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-page">

        <div class="login-left">
            <div class="login-left-content">
                <a href="index.html" class="login-back-btn">← Back to Home</a>
                <div class="login-brand">
                    <h1>SMUCT Angan</h1>
                    <p>আঙিনা — The Campus Courtyard</p>
                </div>
                <div class="login-quote">
                    <p>"Empowering students through creative excellence and technological mastery."</p>
                    <span>— Shanto-Mariam University</span>
                </div>
            </div>
        </div>

        <div class="login-right">
            <div class="login-card">

                <div class="login-header">
                    <div class="login-icon">🔐</div>
                    <h2>Admin Login</h2>
                    <p>Sign in to access the dashboard</p>
                </div>

                <div class="login-form">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="Enter your username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Enter your password">
                    </div>
                    <p id="login-error" class="login-error"></p>
                    <button class="login-submit-btn" onclick="handleLogin()">Login to Dashboard</button>
                </div>

            </div>
        </div>

    </div>

    <script src="js/main.js"></script>
</body>
</html>
